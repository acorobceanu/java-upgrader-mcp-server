spring.application.name=java-upgrader

logging.level.com.javaupgrader=INFO

# MCP server identity
spring.ai.mcp.server.name=java-upgrader
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.instructions=Use this server to upgrade Java projects on GitHub to a newer Java version.

# ---------------------------------------------------------------------------
# OAuth2 Resource Server — JWT validation
#
# REQUIRED: The application will FAIL TO START without one of the two options
# below. Without a configured JWT issuer or JWKS URI, Spring cannot build the
# JwtDecoder bean and the application context will not initialize.
#
# Any standard OIDC provider works (Keycloak, Auth0, AWS Cognito, etc.).
# Set ONE of the following:
#
#   Option A — issuer URI (preferred): Spring fetches the JWKS automatically.
#     spring.security.oauth2.resourceserver.jwt.issuer-uri=https://your-auth-server/realms/your-realm
#
#   Option B — explicit JWKS URI:
#     spring.security.oauth2.resourceserver.jwt.jwks-uri=https://your-auth-server/.well-known/jwks.json
#
# Every request to /sse or /mcp/message must carry: Authorization: Bearer <token>
#
# For local development without a real OIDC provider, you can provide a mock
# JwtDecoder bean in a @TestConfiguration or a dev-only @Configuration class
# annotated with @Profile("dev"). See SecurityConfigTest for an example using
# Spring Boot's @MockitoBean to supply a stub decoder in tests.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# GitHub token — choose ONE of the two options below.
#
# Option 1 — direct environment variable (local development):
#   Export GITHUB_TOKEN=ghp_... before starting the app.
#   The value is read automatically; nothing to set here.
#
# Option 2 — AWS SSM Parameter Store (recommended for Lightsail / production):
#   1. Store the token:
#        aws ssm put-parameter \
#          --name "/java-upgrader/github-token" \
#          --value "ghp_..." \
#          --type SecureString
#   2. Attach an IAM role to the Lightsail instance with this policy:
#        ssm:GetParameter on arn:aws:ssm:<region>:<account>:parameter/java-upgrader/*
#   3. Uncomment the line below — no token in env vars or config files.
#
# github.token.ssm-path=/java-upgrader/github-token
# ---------------------------------------------------------------------------
